<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>⭐ TRACK STARS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --sky:#5ec8f0; --ground:#7ec850; --ground-dark:#5aaa30;
  --white:#fff; --black:#111;
  --green-line:#00843d; --red-line:#da291c; --orange-line:#ed8b00;
  --shadow:0 5px 0 rgba(0,0,0,.2); --shadow-deep:0 7px 0 rgba(0,0,0,.22);
}
html,body { height:100%; overflow:hidden; touch-action:none; }
body { font-family:'Nunito',sans-serif; background:var(--sky); display:flex; flex-direction:column; position:relative; }
.clouds { position:fixed; top:0; left:0; right:0; height:45%; pointer-events:none; z-index:0; overflow:hidden; }
.cloud { position:absolute; background:white; border-radius:50px; opacity:.88; }
.cloud::before,.cloud::after { content:''; position:absolute; background:white; border-radius:50%; }
.c1{width:110px;height:36px;top:6%;left:2%;animation:drift 18s linear infinite}
.c1::before{width:55px;height:55px;top:-27px;left:15px}.c1::after{width:40px;height:40px;top:-18px;left:46px}
.c2{width:80px;height:26px;top:18%;left:55%;animation:drift 24s linear infinite 4s}
.c2::before{width:40px;height:40px;top:-20px;left:8px}.c2::after{width:30px;height:30px;top:-14px;left:35px}
.c3{width:140px;height:42px;top:4%;left:70%;animation:drift 20s linear infinite 8s}
.c3::before{width:65px;height:65px;top:-32px;left:20px}.c3::after{width:50px;height:50px;top:-22px;left:65px}
@keyframes drift{from{transform:translateX(0)}to{transform:translateX(-110vw)}}
.ground-strip { position:fixed; bottom:0; left:0; right:0; height:60px; background:var(--ground); border-top:4px solid var(--ground-dark); z-index:0; }
.ground-strip::before { content:''; position:absolute; top:-4px; left:0; right:0; height:4px; background:repeating-linear-gradient(90deg,transparent 0,transparent 24px,rgba(255,255,255,.3) 24px,rgba(255,255,255,.3) 36px); animation:gs .3s linear infinite; }
@keyframes gs{to{background-position:-36px 0}}
#sp-particles { position:fixed; inset:0; pointer-events:none; z-index:5; }
.spec-page { position:relative; z-index:1; height:100%; display:flex; flex-direction:column; padding:12px 14px 70px; gap:8px; overflow:hidden; }
.spec-header { display:flex; align-items:center; justify-content:space-between; background:var(--white); border:3px solid var(--black); border-radius:16px; padding:8px 16px; box-shadow:var(--shadow); flex-shrink:0; }
.spec-title { font-family:'Bebas Neue',sans-serif; font-size:1.6rem; letter-spacing:.06em; color:var(--black); line-height:1; }
.spec-sub   { font-size:.65rem; font-weight:800; color:#888; }
.spec-live  { display:flex; align-items:center; gap:6px; background:var(--black); color:white; padding:6px 14px; border-radius:100px; font-size:.65rem; font-weight:900; letter-spacing:.14em; }
.ldot { width:7px; height:7px; border-radius:50%; background:#00ff87; box-shadow:0 0 7px #00ff87; animation:blink 1.3s infinite; }
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.spec-top-row { display:flex; gap:8px; flex-shrink:0; }
.spec-speed-card { background:var(--black); border:3px solid var(--black); border-radius:18px; box-shadow:var(--shadow-deep); padding:12px 18px; display:flex; align-items:center; gap:14px; flex:2; min-width:0; }
.spec-speed-card.shake { animation:shake .3s ease; }
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
#sp-big { font-family:'Bebas Neue',sans-serif; font-size:clamp(52px,15vw,90px); line-height:.85; color:white; transition:color .4s; }
.sp-subvals { display:flex; flex-direction:column; gap:2px; }
.sp-kmh  { font-family:'Bebas Neue',sans-serif; font-size:1.15rem; color:#00ff87; }
.sp-ms   { font-family:'DM Mono',monospace; font-size:.6rem; color:rgba(255,255,255,.4); }
.sp-dist { font-family:'DM Mono',monospace; font-size:.58rem; color:rgba(255,255,255,.35); margin-top:2px; }
.spec-pr-card { background:#1a0a2e; border:3px solid #7c3aed; border-radius:18px; box-shadow:0 7px 0 rgba(124,58,237,.4); padding:10px 14px; flex:1; min-width:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; }
.pr-lbl { font-size:.55rem; font-weight:900; letter-spacing:.16em; color:#a78bfa; text-transform:uppercase; }
.pr-val { font-family:'Bebas Neue',sans-serif; font-size:clamp(28px,8vw,46px); color:#e879f9; line-height:1; }
.pr-sub { font-family:'DM Mono',monospace; font-size:.55rem; color:rgba(232,121,249,.5); }
.pr-new { display:none; font-size:.6rem; font-weight:900; color:#ffe44d; letter-spacing:.1em; }
@keyframes prpop{from{transform:scale(1.6)}to{transform:scale(1)}}
.sp-all-tracks { display:flex; flex-direction:column; gap:7px; flex:1; min-height:0; overflow:hidden; }
.sp-track-card { border:3px solid var(--black); border-radius:16px; overflow:hidden; box-shadow:var(--shadow-deep); flex:1; display:flex; flex-direction:column; min-height:0; }
.sp-track-top { padding:7px 14px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; color:white; }
.sp-track-name { font-family:'Bebas Neue',sans-serif; font-size:1.2rem; letter-spacing:.08em; }
.sp-gap-chip   { font-size:.62rem; font-weight:900; letter-spacing:.1em; padding:3px 10px; border-radius:100px; }
.tc-you .sp-track-top { background:#111; }
.tc-you .sp-scene     { background:#0d1117; }
.tc-you .sp-rfill     { background:linear-gradient(90deg,rgba(255,228,0,.15),rgba(255,228,0,.55)); border:1px solid rgba(255,228,0,.4); }
.tc-g .sp-track-top{background:var(--green-line)} .tc-g .sp-scene{background:#004d22} .tc-g .sp-rfill{background:linear-gradient(90deg,rgba(0,255,100,.2),rgba(0,255,100,.55));border:1px solid rgba(0,255,100,.35)}
.tc-r .sp-track-top{background:var(--red-line)}   .tc-r .sp-scene{background:#5a0f0a} .tc-r .sp-rfill{background:linear-gradient(90deg,rgba(255,80,80,.2),rgba(255,80,80,.55));border:1px solid rgba(255,80,80,.35)}
.tc-o .sp-track-top{background:var(--orange-line)} .tc-o .sp-scene{background:#5a2e00} .tc-o .sp-rfill{background:linear-gradient(90deg,rgba(255,170,50,.2),rgba(255,170,50,.55));border:1px solid rgba(255,170,50,.35)}
.sp-scene { position:relative; flex:1; overflow:hidden; }
.sp-rail-bed { position:absolute; inset:0; background:repeating-linear-gradient(90deg,transparent 0,transparent 20px,rgba(255,255,255,.06) 20px,rgba(255,255,255,.06) 24px); }
.sp-ties { position:absolute; top:25%; bottom:25%; left:0; right:70px; background:repeating-linear-gradient(90deg,transparent 0,transparent 18px,rgba(255,255,255,.15) 18px,rgba(255,255,255,.15) 24px); animation:tiescroll .5s linear infinite; }
@keyframes tiescroll{to{background-position:-24px 0}}
.sp-rail-t,.sp-rail-b { position:absolute; left:0; right:70px; height:5px; border-radius:3px; background:#aaa; box-shadow:0 2px 4px rgba(0,0,0,.5); }
.sp-rail-t { top:23%; } .sp-rail-b { bottom:23%; }
.sp-rfill { position:absolute; left:0; top:20%; bottom:20%; border-radius:4px; transition:width .4s ease; }
.sp-finish { position:absolute; right:30px; top:8%; bottom:8%; width:10px; background:repeating-linear-gradient(0deg,white 0,white 6px,black 6px,black 12px); border-radius:3px; opacity:.5; }
.sp-finish-flag { position:absolute; right:16px; top:4%; font-size:1.1rem; opacity:.6; }
.sp-mover { position:absolute; top:50%; transform:translateY(-50%); pointer-events:none; z-index:4; display:flex; flex-direction:column; align-items:center; }
.sp-mover-emoji { font-size:1.8rem; filter:drop-shadow(0 2px 5px rgba(0,0,0,.7)); animation:bob .8s ease-in-out infinite alternate; }
@keyframes bob{from{transform:translateY(0)}to{transform:translateY(-3px)}}
.sp-mtag { font-size:.52rem; font-weight:900; white-space:nowrap; background:rgba(0,0,0,.7); color:white; padding:2px 6px; border-radius:5px; font-family:'DM Mono',monospace; margin-top:2px; }
.sp-mover.you-mover .sp-mtag { background:rgba(255,228,0,.92); color:#222; }
</style>
</head>
<body>
<canvas id="sp-particles"></canvas>
<div class="clouds"><div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div></div>
<div class="ground-strip"></div>

<div class="spec-page">
  <div class="spec-header">
    <div>
      <div class="spec-title">⭐ TRACK STARS</div>
      <div class="spec-sub">spectator view · live race</div>
    </div>
    <div class="spec-live"><div class="ldot"></div>LIVE</div>
  </div>

  <div class="spec-top-row">
    <div class="spec-speed-card" id="sp-speed-card">
      <div id="sp-big">0.0</div>
      <div class="sp-subvals">
        <div class="sp-kmh"  id="sp-kmh">0.0 km/h</div>
        <div class="sp-ms"   id="sp-ms">0.00 m/s</div>
        <div class="sp-dist" id="sp-dist-display">0 m covered</div>
      </div>
    </div>
    <div class="spec-pr-card">
      <div class="pr-lbl">Personal Best</div>
      <div class="pr-val" id="pr-val">0.0</div>
      <div class="pr-sub" id="pr-sub">km/h</div>
      <div class="pr-new" id="pr-new">🏆 NEW PR!</div>
    </div>
  </div>

  <div class="sp-all-tracks">

    <!-- RUNNER — own dedicated track -->
    <div class="sp-track-card tc-you">
      <div class="sp-track-top">
        <span class="sp-track-name">🏃 YOU</span>
        <span style="font-family:'DM Mono',monospace;font-size:.62rem;color:rgba(255,255,255,.45)" id="you-dist-chip">0 m</span>
      </div>
      <div class="sp-scene" id="sp-scene-you">
        <div class="sp-rail-bed"></div><div class="sp-ties"></div>
        <div class="sp-rfill" id="sp-rfill-you" style="width:0%"></div>
        <div class="sp-rail-t"></div><div class="sp-rail-b"></div>
        <div class="sp-finish"></div><div class="sp-finish-flag">🏁</div>
        <div class="sp-mover you-mover" id="sp-m-you" style="left:8px">
          <span class="sp-mover-emoji">🏃</span>
          <div class="sp-mtag" id="sp-you-tag">0 km/h</div>
        </div>
      </div>
    </div>

    <!-- GREEN LINE -->
    <div class="sp-track-card tc-g">
      <div class="sp-track-top">
        <span class="sp-track-name">🟢 GREEN LINE · 13 km/h</span>
        <span class="sp-gap-chip" id="sp-gap-g" style="background:rgba(0,0,0,.3);color:rgba(255,255,255,.7)">…</span>
      </div>
      <div class="sp-scene" id="sp-scene-g">
        <div class="sp-rail-bed"></div><div class="sp-ties"></div>
        <div class="sp-rfill" id="sp-rfill-g" style="width:0%"></div>
        <div class="sp-rail-t"></div><div class="sp-rail-b"></div>
        <div class="sp-finish"></div><div class="sp-finish-flag">🏁</div>
        <div class="sp-mover" id="sp-mt-g" style="left:8px">
          <span class="sp-mover-emoji">🚃</span>
          <div class="sp-mtag">13 km/h</div>
        </div>
      </div>
    </div>

    <!-- RED LINE -->
    <div class="sp-track-card tc-r">
      <div class="sp-track-top">
        <span class="sp-track-name">🔴 RED LINE · 32 km/h</span>
        <span class="sp-gap-chip" id="sp-gap-r" style="background:rgba(0,0,0,.3);color:rgba(255,255,255,.7)">…</span>
      </div>
      <div class="sp-scene" id="sp-scene-r">
        <div class="sp-rail-bed"></div><div class="sp-ties"></div>
        <div class="sp-rfill" id="sp-rfill-r" style="width:0%"></div>
        <div class="sp-rail-t"></div><div class="sp-rail-b"></div>
        <div class="sp-finish"></div><div class="sp-finish-flag">🏁</div>
        <div class="sp-mover" id="sp-mt-r" style="left:8px">
          <span class="sp-mover-emoji">🚇</span>
          <div class="sp-mtag">32 km/h</div>
        </div>
      </div>
    </div>

    <!-- ORANGE LINE -->
    <div class="sp-track-card tc-o">
      <div class="sp-track-top">
        <span class="sp-track-name">🟠 ORANGE LINE · 38 km/h</span>
        <span class="sp-gap-chip" id="sp-gap-o" style="background:rgba(0,0,0,.3);color:rgba(255,255,255,.7)">…</span>
      </div>
      <div class="sp-scene" id="sp-scene-o">
        <div class="sp-rail-bed"></div><div class="sp-ties"></div>
        <div class="sp-rfill" id="sp-rfill-o" style="width:0%"></div>
        <div class="sp-rail-t"></div><div class="sp-rail-b"></div>
        <div class="sp-finish"></div><div class="sp-finish-flag">🏁</div>
        <div class="sp-mover" id="sp-mt-o" style="left:8px">
          <span class="sp-mover-emoji">🚊</span>
          <div class="sp-mtag">38 km/h</div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
const c2=document.getElementById('sp-particles'),x2=c2.getContext('2d');
c2.width=window.innerWidth;c2.height=window.innerHeight;
const pts=[];
function spawnBurst(x,y,col,n=16){for(let i=0;i<n;i++){const a=(Math.PI*2/n)*i+Math.random()*.5,sp=3+Math.random()*5;pts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,life:1,decay:.025+Math.random()*.015,r:4+Math.random()*5,color:col});}}
(function dp(){x2.clearRect(0,0,c2.width,c2.height);for(let i=pts.length-1;i>=0;i--){const p=pts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.18;p.vx*=.97;p.life-=p.decay;if(p.life<=0){pts.splice(i,1);continue;}x2.globalAlpha=p.life;x2.fillStyle=p.color;x2.beginPath();x2.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);x2.fill();}x2.globalAlpha=1;requestAnimationFrame(dp);})();

const TRAINS=[{id:'g',trainMs:3.611,color:'#00ff87'},{id:'r',trainMs:8.889,color:'#ff6b6b'},{id:'o',trainMs:10.556,color:'#ffb347'}];
const WINDOW_M=500;
let curMs=0,youDist=0,lastTs=null,prMs=0;
const trainDist={g:0,r:0,o:0},prevAhead={g:false,r:false,o:false};

function distToX(d,uw){return 8+((d%WINDOW_M)/WINDOW_M)*(uw-20);}

function raceTick(ts){
  if(lastTs!==null){
    const dt=Math.min((ts-lastTs)/1000,.2);
    youDist+=curMs*dt;
    TRAINS.forEach(t=>{trainDist[t.id]+=t.trainMs*dt;});
  }
  lastTs=ts;

  // runner track
  const ys=document.getElementById('sp-scene-you');
  if(ys){
    const uw=ys.offsetWidth-80;
    const yX=distToX(youDist,uw);
    const m=document.getElementById('sp-m-you');if(m)m.style.left=yX+'px';
    const f=document.getElementById('sp-rfill-you');if(f)f.style.width=Math.max(0,((youDist%WINDOW_M)/WINDOW_M)*100)+'%';
    const t=document.getElementById('sp-you-tag');if(t)t.textContent=(curMs*3.6).toFixed(1)+' km/h';
    const c=document.getElementById('you-dist-chip');if(c)c.textContent=youDist.toFixed(0)+' m';
  }

  // train tracks
  TRAINS.forEach(({id,trainMs,color})=>{
    const sc=document.getElementById('sp-scene-'+id);if(!sc)return;
    const uw=sc.offsetWidth-80;
    const tX=distToX(trainDist[id],uw);
    const mt=document.getElementById('sp-mt-'+id);if(mt)mt.style.left=tX+'px';
    const f=document.getElementById('sp-rfill-'+id);if(f)f.style.width=Math.max(0,((trainDist[id]%WINDOW_M)/WINDOW_M)*100)+'%';
    const gap=document.getElementById('sp-gap-'+id);
    const ahead=youDist>trainDist[id];
    if(ahead){
      const am=youDist-trainDist[id];
      gap.style.background='#ffe44d';gap.style.color='#222';
      gap.textContent='🏆 +'+am.toFixed(0)+'m ahead';
      if(!prevAhead[id]){
        const r=sc.getBoundingClientRect();spawnBurst(r.left+tX,r.top+r.height/2,color,18);
        const card=document.getElementById('sp-speed-card');card.classList.remove('shake');void card.offsetWidth;card.classList.add('shake');
      }
      prevAhead[id]=true;
    } else {
      const bm=trainDist[id]-youDist;
      gap.style.background='rgba(0,0,0,.4)';gap.style.color='rgba(255,255,255,.7)';
      gap.textContent=bm<3?'⚡ NECK & NECK!':bm.toFixed(0)+'m behind';
      prevAhead[id]=false;
    }
  });
  requestAnimationFrame(raceTick);
}

function updateUI(ms){
  const kmh=ms*3.6;
  document.getElementById('sp-big').textContent=kmh.toFixed(1);
  document.getElementById('sp-kmh').textContent=kmh.toFixed(1)+' km/h';
  document.getElementById('sp-ms').textContent=ms.toFixed(2)+' m/s';
  document.getElementById('sp-dist-display').textContent=youDist.toFixed(0)+' m covered';
  const big=document.getElementById('sp-big');
  if(ms>=10.5)big.style.color='#e879f9';
  else if(ms>=8.9)big.style.color='#ff6b6b';
  else if(ms>=3.6)big.style.color='#00ff87';
  else if(ms>=2.7)big.style.color='#60a5fa';
  else big.style.color='#fff';
  if(ms>prMs){
    prMs=ms;
    document.getElementById('pr-val').textContent=(prMs*3.6).toFixed(1);
    document.getElementById('pr-sub').textContent='km/h · '+prMs.toFixed(2)+' m/s';
    const pn=document.getElementById('pr-new');pn.style.display='block';pn.style.animation='none';void pn.offsetWidth;pn.style.animation='prpop .4s ease';
    clearTimeout(pn._t);pn._t=setTimeout(()=>{pn.style.display='none';},2000);
    const pc=document.querySelector('.spec-pr-card'),r=pc.getBoundingClientRect();
    spawnBurst(r.left+r.width/2,r.top+r.height/2,'#e879f9',22);
  }
}

function setSpeed(ms){if(!isFinite(ms)||ms<0)return;curMs=ms;updateUI(ms);}

async function poll(){try{const r=await fetch('/api/distance'),d=await r.json();setSpeed(parseFloat(d.distance??d.speed??0));}catch(_){}}

setSpeed(0);
requestAnimationFrame(raceTick);

// realtime updates via server-sent events (MQTT data relayed by Flask)
let sseOpen = false;
const es = new EventSource('/stream');
es.onopen = function() { sseOpen = true; };
es.onmessage = function(e) {
    if (e.data && e.data !== "null" && e.data !== '') {
        const speed = parseFloat(e.data);
        if (isFinite(speed)) setSpeed(speed);
    }
};
es.onerror = function() {
    sseOpen = false;
    console.error('SSE error');
};

// polling fallback — only fires when SSE is not connected
setInterval(function(){ if(!sseOpen) poll(); }, 500);
</script>
</body>
</html>
